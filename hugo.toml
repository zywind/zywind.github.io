baseURL = "https://zywind.github.io/"
defaultContentLanguage = "en"
title = "Yunfeng Zhang"
theme = "PaperMod"

enableRobotsTXT = true
enableInlineShortcodes = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Yunfeng Zhang"
  description = "Yunfeng Zhang's personal website."
  keywords = ["Yunfeng Zhang", "Responsible AI", "machine learning", "blog"]
  author = "Yunfeng Zhang"
  defaultTheme = "auto"     # auto | light | dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  comments = false

  # Home page: avatar + bio + social icons, with recent posts listed below.
  [params.homeInfoParams]
    Title = "Hi, I'm Yunfeng 👋"
    Content = """
<img class="home-avatar" src="/images/prof_pic.jpg" alt="Yunfeng Zhang" />

I'm a staff machine learning engineer at **Superhuman** (formerly Grammarly), where I build LLM-powered features for **Superhuman Go**, our proactive AI assistant. Over the past decade I've taken ML systems from prototype to production at **Twitter**, **EvolutionIQ**, and **IBM Research** — spanning LLMs and NLP, recommendation and ranking, and classical methods like gradient-boosted trees and survival analysis — with a high bar for model quality, performance, and Responsible AI. My work spans 50+ published papers, 7,600+ citations, and a dozen patents.

<a class="resume-btn" href="/resume.pdf">📄 Résumé</a>
"""

  [[params.socialIcons]]
    name = "linkedin"
    title = "LinkedIn"
    url = "https://www.linkedin.com/in/zywind"

  [[params.socialIcons]]
    name = "googlescholar"
    title = "Google Scholar"
    url = "https://scholar.google.com/citations?user=rvNh9gEAAAAJ"

  [[params.socialIcons]]
    name = "github"
    title = "GitHub"
    url = "https://github.com/zywind"

[markup]
  [markup.goldmark.renderer]
    unsafe = true          # allow the <img> avatar in homeInfoParams
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[menu]
  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/resume.pdf"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON enables PaperMod search
